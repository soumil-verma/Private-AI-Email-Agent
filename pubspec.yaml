name: private_email_agent
description: A private, local-first email triage and reply preparation agent.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  drift: ^2.34.0
  drift_flutter: ^0.3.0
  enough_mail: 2.1.7
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.2
  flutter_secure_storage: ^10.3.1
  freezed_annotation: ^3.1.0
  http: ^1.6.0
  json_annotation: ^4.12.0

dev_dependencies:
  build_runner: ^2.15.0
  drift_dev: 2.34.0
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  freezed: ^3.2.5
  json_serializable: ^6.14.0

flutter:
  uses-material-design: true
